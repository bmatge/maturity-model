{% extends "base.html" %}
{% block title %}Nouveau site — Maturité ComNum{% endblock %}

{% block content %}
<h1 class="fr-h3 fr-mb-4w">Ajouter un site web</h1>

<div class="fr-card" style="max-width: 600px;">
    <div class="fr-card__body">
        <div class="fr-card__content">
            <form method="POST">
                <div class="fr-input-group">
                    <label class="fr-label" for="nom">Nom du site</label>
                    <input class="fr-input" type="text" id="nom" name="nom" required
                           placeholder="Ex: solidarites.gouv.fr">
                </div>
                <div class="fr-input-group">
                    <label class="fr-label" for="url">URL (optionnel)</label>
                    <input class="fr-input" type="url" id="url" name="url"
                           placeholder="https://solidarites.gouv.fr">
                </div>
                <div class="fr-select-group">
                    <label class="fr-label" for="organisation_id">Organisation de rattachement</label>
                    <select class="fr-select" id="organisation_id" name="organisation_id" required>
                        {% for e in entites %}
                        <option value="{{ e.id }}">{{ e.nom }} ({{ e.type }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="fr-input-group">
                    <label class="fr-label" for="description">Description (optionnel)</label>
                    <textarea class="fr-input" id="description" name="description" rows="3"
                              placeholder="Description du site"></textarea>
                </div>
                <ul class="fr-btns-group fr-btns-group--inline">
                    <li><button type="submit" class="fr-btn">Créer le site</button></li>
                    <li><a href="{{ url_for('sites_list') }}" class="fr-btn fr-btn--secondary">Annuler</a></li>
                </ul>
            </form>
        </div>
    </div>
</div>
{% endblock %}
