{% extends "base.html" %}
{% block title %}Nouvelle évaluation — Maturité ComNum{% endblock %}

{% block content %}
<h1 class="fr-h3 fr-mb-4w">Lancer une évaluation</h1>

<div class="fr-card" style="max-width: 600px;">
    <div class="fr-card__body">
        <div class="fr-card__content">
            <form method="POST">
                <!-- 1. Choix du référentiel -->
                <div class="fr-select-group">
                    <label class="fr-label" for="referentiel_id">Référentiel</label>
                    <select class="fr-select" id="referentiel_id" name="referentiel_id" required>
                        {% for r in referentiels %}
                        <option value="{{ r.id }}" data-cible="{{ r.cible }}">
                            {{ r.label }} ({{ r.cible }})
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- 2a. Bloc organisation (campagne + entité) -->
                <div id="block-organisation">
                    <div class="fr-select-group">
                        <label class="fr-label" for="campagne_id">Campagne (optionnel)</label>
                        <select class="fr-select" id="campagne_id" name="campagne_id">
                            <option value="">— Sans campagne —</option>
                            {% for c in campagnes %}
                            <option value="{{ c.id }}">{{ c.label }} ({{ c.date_debut.strftime('%d/%m/%Y') }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="fr-select-group">
                        <label class="fr-label" for="entite_id">Organisation à évaluer</label>
                        <select class="fr-select" id="entite_id" name="entite_id">
                            {% for e in entites %}
                            <option value="{{ e.id }}">{{ e.nom }} ({{ e.type }})</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <!-- 2b. Bloc site -->
                <div id="block-site" style="display:none;">
                    <div class="fr-select-group">
                        <label class="fr-label" for="site_id">Site à évaluer</label>
                        <select class="fr-select" id="site_id" name="site_id">
                            {% for s in sites %}
                            <option value="{{ s.id }}">{{ s.nom }} ({{ s.organisation.nom }})</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <!-- 3. Évaluateur -->
                <div class="fr-input-group">
                    <label class="fr-label" for="evaluateur">Évaluateur (optionnel)</label>
                    <input class="fr-input" type="text" id="evaluateur" name="evaluateur"
                           placeholder="Nom de la personne qui évalue">
                </div>

                <ul class="fr-btns-group fr-btns-group--inline">
                    <li><button type="submit" class="fr-btn fr-btn--icon-left fr-icon-clipboard-line">Démarrer l'évaluation</button></li>
                    <li><a href="{{ url_for('evaluations_list') }}" class="fr-btn fr-btn--secondary">Annuler</a></li>
                </ul>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function() {
    var selRef = document.getElementById('referentiel_id');
    var blockOrg = document.getElementById('block-organisation');
    var blockSite = document.getElementById('block-site');
    var selEntite = document.getElementById('entite_id');
    var selSite = document.getElementById('site_id');

    function updateCible() {
        var opt = selRef.options[selRef.selectedIndex];
        var cible = opt ? opt.dataset.cible : 'organisation';
        var isOrg = cible === 'organisation';
        blockOrg.style.display = isOrg ? '' : 'none';
        blockSite.style.display = isOrg ? 'none' : '';
        selEntite.required = isOrg;
        selSite.required = !isOrg;
    }

    selRef.addEventListener('change', updateCible);
    updateCible();
})();
</script>
{% endblock %}
